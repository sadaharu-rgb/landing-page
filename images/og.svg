    <linearGradient id="faceOg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a4564" />
      <stop offset="1" stop-color="#3d3a52" />
    </linearGradient>
    <radialGradient id="eyeOg" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7df0a8" stop-opacity="1" />
      <stop offset="0.7" stop-color="#4ade80" stop-opacity="0.6" />
      <stop offset="1" stop-color="#4ade80" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

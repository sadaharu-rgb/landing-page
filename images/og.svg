    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.20" />
      <stop offset="1" stop-color="#4ade80" stop-opacity="0" />
    </radialGradient>
    <pattern id="gridOg" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" stroke="rgba(255,255,255,0.035)" stroke-width="1" fill="none" />
    </pattern>
    <linearGradient id="hairOg" x1="0" y1="0" x2="0" y2="1">

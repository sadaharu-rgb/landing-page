<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" fill="none" aria-hidden="true">
  <!--
    Rei v3（公式 REI ANALYTICS リファレンス準拠）
    - サイドバング明確・アニメ顔・緑袖ロゴ・REIフード文字
    - 「感情ゼロで、相場を読む」のクール表情
  -->
  <defs>
    <linearGradient id="hairV3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a52" />
      <stop offset="1" stop-color="#1f1f30" />
    </linearGradient>
    <linearGradient id="hoodV3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1c2e" />
      <stop offset="1" stop-color="#13131f" />
    </linearGradient>
    <linearGradient id="faceV3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a4564" />
      <stop offset="1" stop-color="#3d3a52" />
    </linearGradient>
    <radialGradient id="eyeV3" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7df0a8" stop-opacity="1" />
      <stop offset="0.7" stop-color="#4ade80" stop-opacity="0.6" />
      <stop offset="1" stop-color="#4ade80" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="cheekV3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.18" />
      <stop offset="1" stop-color="#4ade80" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- ===== フード本体（オーバーサイズ） ===== -->
  <path d="M 30 380 Q 60 290 200 285 Q 340 290 370 380 L 388 560 L 12 560 Z"
        fill="url(#hoodV3)" stroke="#2a2a40" stroke-width="1.5" />
  <!-- フード襟 -->
  <path d="M 85 350 Q 130 325 200 325 Q 270 325 315 350 L 320 395 Q 270 365 200 365 Q 130 365 80 395 Z"
        fill="#16162a" />

  <!-- ===== 腕組み ===== -->
  <path d="M 60 420 Q 90 408 165 418 L 175 472 Q 90 482 60 470 Z"
        fill="url(#hoodV3)" stroke="#2a2a40" stroke-width="1.5" />
  <path d="M 340 420 Q 310 408 235 418 L 225 472 Q 310 482 340 470 Z"
        fill="url(#hoodV3)" stroke="#2a2a40" stroke-width="1.5" />

  <!-- 袖の縦ネオンライン（公式準拠：袖の長い緑ライン） -->
  <path d="M 75 380 L 90 410 L 80 470 L 88 540" stroke="#4ade80" stroke-width="2.4" opacity="0.9" fill="none" stroke-linecap="round" />
  <path d="M 325 380 L 310 410 L 320 470 L 312 540" stroke="#4ade80" stroke-width="2.4" opacity="0.9" fill="none" stroke-linecap="round" />

  <!-- 袖のREI ANALYTICS 円ロゴ（左袖） -->
  <circle cx="115" cy="450" r="14" fill="#0f0f1a" stroke="#4ade80" stroke-width="1.4" />
  <path d="M 107 458 L 110 442 L 115 452 L 120 442 L 123 458"
        stroke="#4ade80" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- フード胸元の「REI」テキスト -->
  <text x="200" y="455" text-anchor="middle" font-family="'JetBrains Mono', monospace"
        font-weight="700" font-size="22" letter-spacing="6" fill="#4ade80" opacity="0.92">REI</text>

  <!-- ドローコード -->
  <line x1="180" y1="355" x2="180" y2="440" stroke="#4ade80" stroke-width="2.6" stroke-linecap="round" opacity="0.85" />
  <line x1="220" y1="355" x2="220" y2="440" stroke="#4ade80" stroke-width="2.6" stroke-linecap="round" opacity="0.85" />
  <circle cx="180" cy="440" r="3.2" fill="#4ade80" />
  <circle cx="220" cy="440" r="3.2" fill="#4ade80" />

  <!-- ===== 後ろ髪（長め・流れる） ===== -->
  <path d="M 95 210 Q 70 320 100 480 L 145 480 Q 125 350 125 220 Z" fill="url(#hairV3)" />
  <path d="M 305 210 Q 330 320 300 480 L 255 480 Q 275 350 275 220 Z" fill="url(#hairV3)" />

  <!-- ===== 顔（アニメ寄り・少し丸め） ===== -->
  <ellipse cx="200" cy="228" rx="72" ry="83" fill="url(#faceV3)" stroke="#564f70" stroke-width="1.2" />

  <!-- ===== 前髪・サイドバング ===== -->
  <!-- センター分け前髪 -->
  <path d="M 132 168 Q 200 108 268 168
           Q 270 195 240 192
           Q 220 175 200 180
           Q 180 175 160 192
           Q 130 195 132 168 Z"
        fill="url(#hairV3)" />
  <!-- 左サイドバング（顔の左を縁取る） -->
  <path d="M 132 168 Q 110 200 105 270 Q 118 230 135 200 Q 140 180 132 168 Z"
        fill="url(#hairV3)" />
  <!-- 右サイドバング -->
  <path d="M 268 168 Q 290 200 295 270 Q 282 230 265 200 Q 260 180 268 168 Z"
        fill="url(#hairV3)" />
  <!-- 顔横の短い髪のすだれ（公式の特徴） -->
  <path d="M 128 195 L 125 260 L 138 230 Z" fill="url(#hairV3)" opacity="0.85" />
  <path d="M 272 195 L 275 260 L 262 230 Z" fill="url(#hairV3)" opacity="0.85" />

  <!-- 髪のハイライト -->
  <path d="M 165 130 Q 200 118 235 130 Q 220 142 200 142 Q 180 142 165 130 Z"
        fill="#5e5878" opacity="0.6" />

  <!-- ===== 猫耳（毛フサふわ感UP） ===== -->
  <polygon points="120,72 144,150 170,118" fill="#1f1f30" stroke="#564f70" stroke-width="1.5" stroke-linejoin="round" />
  <polygon points="135,98 146,140 160,118" fill="#3a3a52" opacity="0.8" />
  <polygon points="142,116 148,138 154,124" fill="#4ade80" opacity="0.45" />
  <polygon points="280,72 256,150 230,118" fill="#1f1f30" stroke="#564f70" stroke-width="1.5" stroke-linejoin="round" />
  <polygon points="265,98 254,140 240,118" fill="#3a3a52" opacity="0.8" />
  <polygon points="258,116 252,138 246,124" fill="#4ade80" opacity="0.45" />

  <!-- 髪の小さい毛束（耳近辺） -->
  <path d="M 120 95 L 115 130 L 128 110 Z" fill="url(#hairV3)" />
  <path d="M 280 95 L 285 130 L 272 110 Z" fill="url(#hairV3)" />

  <!-- ===== 丸メガネ（しっかり） ===== -->
  <circle cx="167" cy="232" r="29" stroke="#888caf" stroke-width="2.6" fill="rgba(74,222,128,0.04)" />
  <circle cx="233" cy="232" r="29" stroke="#888caf" stroke-width="2.6" fill="rgba(74,222,128,0.04)" />
  <line x1="196" y1="232" x2="204" y2="232" stroke="#888caf" stroke-width="2.6" />
  <line x1="138" y1="232" x2="122" y2="228" stroke="#888caf" stroke-width="2" />
  <line x1="262" y1="232" x2="278" y2="228" stroke="#888caf" stroke-width="2" />

  <!-- ===== 緑目（アニメ大目・くっきり） ===== -->
  <ellipse cx="167" cy="234" rx="10" ry="11" fill="url(#eyeV3)" />
  <ellipse cx="233" cy="234" rx="10" ry="11" fill="url(#eyeV3)" />
  <ellipse cx="167" cy="234" rx="7" ry="8" fill="#4ade80" />
  <ellipse cx="233" cy="234" rx="7" ry="8" fill="#4ade80" />
  <ellipse cx="167" cy="234" rx="3" ry="4" fill="#0a2e1a" />
  <ellipse cx="233" cy="234" rx="3" ry="4" fill="#0a2e1a" />
  <!-- アニメ風ハイライト（大小2粒） -->
  <ellipse cx="170" cy="230" rx="2" ry="2.4" fill="#ffffff" />
  <ellipse cx="236" cy="230" rx="2" ry="2.4" fill="#ffffff" />
  <circle cx="163" cy="237" r="1.1" fill="#ffffff" opacity="0.85" />
  <circle cx="229" cy="237" r="1.1" fill="#ffffff" opacity="0.85" />

  <!-- まつ毛（上） -->
  <path d="M 156 220 Q 167 215 178 220" stroke="#3a3a52" stroke-width="2" fill="none" stroke-linecap="round" />
  <path d="M 222 220 Q 233 215 244 220" stroke="#3a3a52" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- 頬の緑ブラッシュ -->
  <ellipse cx="148" cy="268" rx="13" ry="6" fill="url(#cheekV3)" />
  <ellipse cx="252" cy="268" rx="13" ry="6" fill="url(#cheekV3)" />

  <!-- 鼻・口 -->
  <ellipse cx="200" cy="265" rx="1.2" ry="2" fill="#564f70" opacity="0.7" />
  <path d="M 189 287 Q 200 293 211 287" stroke="#888caf" stroke-width="2" fill="none" stroke-linecap="round" />
</svg>

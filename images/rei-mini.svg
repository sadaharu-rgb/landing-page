<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" aria-hidden="true">
  <!-- ミニチビRei（散布用・40x40・要点だけ：猫耳・丸メガネ・緑目） -->
  <!-- 後ろ髪（顔の周りを囲む） -->
  <path d="M 8 22 Q 6 30 9 36 L 13 36 Q 11 28 12 24 Z" fill="#2a2a40" />
  <path d="M 32 22 Q 34 30 31 36 L 27 36 Q 29 28 28 24 Z" fill="#2a2a40" />

  <!-- 猫耳 -->
  <polygon points="9,11 14,4 16,13" fill="#22223a" stroke="#5a5a78" stroke-width="0.6" stroke-linejoin="round" />
  <polygon points="31,11 26,4 24,13" fill="#22223a" stroke="#5a5a78" stroke-width="0.6" stroke-linejoin="round" />
  <polygon points="12,11 14,7 15,12" fill="#4ade80" opacity="0.6" />
  <polygon points="28,11 26,7 25,12" fill="#4ade80" opacity="0.6" />

  <!-- 顔 -->
  <circle cx="20" cy="22" r="10" fill="#3d3d56" stroke="#4a4a68" stroke-width="0.8" />

  <!-- 前髪 -->
  <path d="M 11 18 Q 20 11 29 18 Q 28 21 25 21 Q 20 18 15 21 Q 12 21 11 18 Z" fill="#2a2a40" />

  <!-- 丸メガネ -->
  <circle cx="16" cy="23" r="3.4" stroke="#7a7aa0" stroke-width="0.7" fill="none" />
  <circle cx="24" cy="23" r="3.4" stroke="#7a7aa0" stroke-width="0.7" fill="none" />
  <line x1="19.3" y1="23" x2="20.7" y2="23" stroke="#7a7aa0" stroke-width="0.7" />

  <!-- 緑目 -->
  <circle cx="16" cy="23" r="1.8" fill="#4ade80" />
  <circle cx="24" cy="23" r="1.8" fill="#4ade80" />
  <circle cx="16.5" cy="22.5" r="0.55" fill="#ffffff" />
  <circle cx="24.5" cy="22.5" r="0.55" fill="#ffffff" />

  <!-- 控えめ微笑 -->
  <path d="M 18 28 Q 20 29.5 22 28" stroke="#7a7aa0" stroke-width="0.7" fill="none" stroke-linecap="round" />
</svg>
